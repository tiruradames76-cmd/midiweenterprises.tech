<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midiwe Enterprises | Strategic IT Consulting</title>
    <style>
        :root {
            --bg: #0b1120;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* Navigation */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0; 
            border-bottom: 1px solid var(--border); 
        }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* Hero Section */
        header { text-align: center; padding: 120px 0 80px; }
        h1 { font-size: 4rem; letter-spacing: -3px; margin-bottom: 20px; line-height: 1.1; }
        .hero-sub { color: var(--text-dim); font-size: 1.25rem; max-width: 700px; margin: 0 auto 40px; }

        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card h3 { color: var(--accent); margin-top: 0; font-size: 1.5rem; }
        .card p { color: var(--text-dim); font-size: 1rem; }

        .wide { grid-column: span 2; }
        .tall { grid-row: span 2; }

        /* Tech Stack Section */
        .tech-stack {
            background: rgba(56, 189, 248, 0.05);
            padding: 40px;
            border-radius: 24px;
            border: 1px dashed var(--accent);
            text-align: center;
        }

        .stack-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .tag {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            background: var(--accent);
            color: #000;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        /* Responsive Mobile Layout */
        @media (max-width: 850px) {
            .bento-grid { grid-template-columns: 1fr; }
            .wide { grid-column: span 1; }
            h1 { font-size: 2.8rem; }
            header { padding: 60px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <div class="logo">MIDIWE<span>.ENTER
