<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midiwe Enterprises | Enterprise IT Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.5);
            --text-white: #f8fafc;
            --text-gray: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text-white);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }

        /* Hero Section */
        header {
            padding: 120px 0 80px;
            text-align: center;
        }

        .badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
            margin: 1rem 0;
            letter-spacing: -2px;
        }

        .hero-sub {
            font-size: 1.25rem;
            color: var(--text-gray);
            max-width: 700px;
            margin: 0 auto 2.5rem;
        }

        /* Bento Grid Services */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 5rem;
        }

        .service-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .service-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .service-card h3 { margin-top: 0; color: var(--primary); }
        .service-card p { color: var(--text-gray); line-height: 1.6; }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: #000;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover { background: #7dd3fc; transform: scale(1.02); }

        /* Footer */
        footer {
            text-align: center;
            padding: 4rem 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: var(--text-gray);
        }

        @media (max-width: 900px) {
            h1 { font-size: 3rem; }
            .services-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <nav>
            <div class="logo">MIDIWE<span>.ENTERPRISES</span></div>
            <a href="mailto:info@midiweenterprises.tech" style="color: var(--text-white); text-decoration: none;
