<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midiwe Enterprises | Strategic IT Consulting & Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #030712;
            --card-bg: #111827;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #1f2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        /* --- Navigation --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex; justify-content: space-between; align-items: center; height: 80px;
        }
        .logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }
        .nav-links a {
            text-decoration: none; color: var(--text-dim);
            margin-left: 2rem; font-weight: 600; font-size: 0.9rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* --- Sections --- */
        section { padding: 120px 0; border-bottom: 1px solid var(--border); }
        .center { text-align: center; }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; letter-spacing: -1.5px; }
        .sub-h2 { color: var(--text-dim); margin-bottom: 3rem; max-width: 650px; margin-inline: auto; font-size: 1.1rem; }

        /* --- Home (Hero) --- */
        #home {
            padding-top: 220px;
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent);
        }
        h1 { font-size: clamp(2.8rem, 7vw, 4.8rem); line-height: 1.05; margin-bottom: 1.8rem; letter-spacing: -3px; }
        .btn {
            background: var(--primary); color: #000;
            padding: 1.1rem 2.5rem; border-radius: 12px;
            text-decoration: none; font-weight: 800; display: inline-block;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(56, 189, 248, 0.25); background: #7dd3fc; }

        /* --- About --- */
        .about-content {
            display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 5rem; align-items: center;
        }
        .stats { display: flex; gap: 3rem; margin-top: 2.5rem; }
        .stat-item h4 { color: var(--primary); font-size: 1.8rem; font-weight: 800; }
        .stat-item p { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }

        /* --- Services (Grid) --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .card {
            background: var(--card-bg); padding: 3rem; border-radius: 24px;
            border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); background: #1f2937; }
        .card h3 { margin-bottom: 1.2rem; color: var(--primary); font-size: 1.4rem; }
        .card p { color: var(--text-dim); font-size: 0.95rem; }

        /* --- Support Section --- */
        .support-box {
            background: rgba(56, 189, 248, 0.03);
            padding: 5rem 2rem; border-radius: 40px; border: 1px dashed var(--primary);
            max-width: 900px; margin: 0 auto;
        }

        /* --- Footer --- */
        footer { padding: 5rem 0 3rem; text-align: center; }
        .footer-links { margin-bottom: 2rem; }
        .footer-links a { color: var(--text-dim); text-decoration: none; margin: 0 15px; font-size: 0.9rem; transition: 0.3s; }
        .footer-links a:hover { color: var(--primary); }
        .copyright { color: var(--text-dim); font-size: 0.85rem; opacity: 0.7; }

        @media (max-width: 968px) {
            .about-content, .grid { grid-template-columns: 1fr; }
            h1 { font-size: 3.2rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-inner">
            <a href="#home" class="logo">MIDIWE<span>.ENTERPRISES</span></a>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#about">About
