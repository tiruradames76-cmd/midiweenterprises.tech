<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midiwe Enterprises | Strategic IT Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #030712;
            --card-bg: #111827;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #1f2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        /* --- Navigation --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex; justify-content: space-between; align-items: center; height: 80px;
        }
        .logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }
        .nav-links a {
            text-decoration: none; color: var(--text-dim);
            margin-left: 2rem; font-weight: 600; font-size: 0.9rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* --- Hero --- */
        #home {
            padding: 220px 0 120px;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent);
        }
        h1 { font-size: clamp(2.5rem, 7vw, 4.5rem); line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -2px; }
        .btn {
            background: var(--primary); color: #000;
            padding: 1.1rem 2.5rem; border-radius: 12px;
            text-decoration: none; font-weight: 800; display: inline-block;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }

        /* --- Sections --- */
        section { padding: 100px 0; border-bottom: 1px solid var(--border); }
        h2 { font-size: 2.8rem; margin-bottom: 1rem; letter-spacing: -1.5px; text-align: center; }
        .sub-h2 { color: var(--text-dim); margin-bottom: 4rem; max-width: 600px; margin-inline: auto; text-align: center; }

        /* --- About --- */
        .about-content {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
        }
        .stats { display: flex; gap: 2rem; margin-top: 2rem; }
        .stat-item h4 { color: var(--primary); font-size: 1.8rem; }

        /* --- Services --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .card {
            background: var(--card-bg); padding: 2.5rem; border-radius: 24px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card h3 { color: var(--primary); margin-bottom: 1rem; }

        /* --- Support --- */
        .support-box {
            background: rgba(56, 189, 248, 0.05);
            padding: 4rem; border-radius: 30px; border: 1px dashed var(--primary);
            text-align: center;
        }

        /* --- Footer --- */
        footer { padding: 4rem 0; border-top: 1px solid var(--border); }
        .footer-inner {
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-dim); font-size: 0.9rem;
        }
        .footer-links a { color: var(--text-dim); text-decoration: none; margin-left: 20px; transition: 0.3s; }
        .footer-links a:hover { color: var(--primary); }

        @media (max-width: 850px) {
            .about-content, .grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-inner">
            <a href="#home" class="logo">MIDIWE<span>.ENTERPRISES</span></a>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#services">Services</a>
                <a href="#support">Support</a>
            </div>
        </div>
    </nav>

    <section id="home">
        <div class="container">
            <h1>IT Strategy for <br>Modern Enterprise.</h1>
            <p class="sub-h2">Midiwe Enterprises bridges the gap between complex technology and business growth through expert IT consulting.</p>
