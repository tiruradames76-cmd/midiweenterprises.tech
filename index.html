<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midiwe Enterprises | IT Consulting & Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #030712;
            --card-bg: #111827;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #1f2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        /* --- Navigation --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex; justify-content: space-between; align-items: center; height: 80px;
        }
        .logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }
        .nav-links a {
            text-decoration: none; color: var(--text-dim);
            margin-left: 2rem; font-weight: 600; font-size: 0.9rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }

        /* --- Sections --- */
        section { padding: 100px 0; border-bottom: 1px solid var(--border); }
        .center { text-align: center; }
        h2 { font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: -1px; }
        .sub-h2 { color: var(--text-dim); margin-bottom: 3rem; max-width: 600px; margin-inline: auto; }

        /* --- Home (Hero) --- */
        #home {
            padding-top: 200px;
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent);
        }
        h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 1.5rem; }
        .btn {
            background: var(--primary); color: #000;
            padding: 1rem 2rem; border-radius: 10px;
            text-decoration: none; font-weight: 700; display: inline-block;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }

        /* --- About --- */
        .about-content {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
        }
        .stats { display: flex; gap: 2rem; margin-top: 2rem; }
        .stat-item h4 { color: var(--primary); font-size: 1.5rem; }

        /* --- Services (Bento) --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .card {
            background: var(--card-bg); padding: 2.5rem; border-radius: 20px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .card:hover { border-color: var(--primary); }
        .card h3 { margin-bottom: 1rem; color: var(--primary); }

        /* --- Support --- */
        .support-box {
            background: linear-gradient(rgba(56, 189, 248, 0.05), rgba(56, 189, 248, 0.05));
            padding: 4rem; border-radius: 30px; border: 1px dashed var(--primary);
        }
